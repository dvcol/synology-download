name: 🚧 Build
description: Install and build the repo

inputs:
  mode:
    description: 'Build the monorepo'
    required: true
    default: web


runs:
  using: "composite"
  steps:
    - name: 🧱 Install
      uses: ./.github/actions/install

    - name: 🚧 Build sources
      shell: bash
      run: |
        # =================  🚧 Build  =================

        pnpm build:${{ inputs.mode }}